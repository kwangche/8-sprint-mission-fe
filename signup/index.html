<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>판다마켓</title>
  <link rel="icon" type="image/png" sizes="40x40" href="/img/logo/panda-icon.png">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/login-signup.css">
  <link href="/font/ROKAF Slab Serif Medium.otf" rel="stylesheet">
  <style>

  </style>
</head>
<body>
  <div class="overlay">
    <div class="overlay-content">
      <div class="alert-box">
        <span></span>
        <button class="close-btn">확인</button>
      </div>
    </div>
  </div>
  <div class="login-container">
    <a class="logo" href="/">
      <img src="/img/logo/panda-icon-2.png" alt="판다마켓 로고">
      <h1>판다마켓</h1>
    </a>
    <form class="form-box" action="/login/">
      <div class="input-box">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="이메일을 입력해 주세요">
        <span></span>
      </div>
      <div class="input-box">
        <label for="name">닉네임</label>
        <input type="text" id="name" placeholder="닉네임을 입력해 주세요">
        <span></span>
      </div>
      <div class="input-box">
        <label for="password">비밀번호</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="비밀번호를 입력해 주세요">
          <button type="button" class="password-toggle"></button>
        </div>
        <span></span>
      </div>
      <div class="input-box">
        <label for="password-comfirm">비밀번호 확인</label>
        <div class="password-wrapper">
          <input type="password" id="password-comfirm" placeholder="비밀번호를 다시 한 번 입력해 주세요">
          <button type="button" class="password-toggle"></button>
        </div>
        <span></span>
      </div>

      <button class="form-btn" data-mode="signup">회원가입</button>

      <div class="social-login">
        <span>간편 로그인하기</span>
        <div class="social-icons">
          <a href="https://www.google.com/">
            <img src="/img/icon/ic_google.png" alt="구글 로그인">
          </a>
          <a href="https://www.kakaocorp.com/page/">
            <img src="/img/icon/ic_kakao.png" alt="카카오 로그인">
          </a>
        </div>
      </div>

      <div class="login-signup">
        이미 회원이신가요?
        <a href="/login/">로그인</a>
      </div>
    </form>
  </div>
  <script type="module" src="/js/logic/logIn-signup/inputCheck.js"></script>
  <script type="module" src="/js/logic/logIn-signup/logIn-signUp.js"></script>
</body>
</html>
